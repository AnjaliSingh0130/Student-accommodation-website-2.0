<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | StayEase</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark" style="background-color:#1a4971;">
  <div class="container">
    <a class="navbar-brand" href="index.html">🏠 StayEase</a>
    <span class="text-light small">Student Accommodation Website</span>
  </div>
</nav>

<div class="container py-5" style="max-width:420px;">
  <div class="card property-card p-4">
    <h3 class="mb-3 text-center">Login</h3>
    <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center mt-3 mb-0 small">
      New here? <a href="register.html">Create an account</a>
    </p>
  </div>
</div>

<footer class="text-center">
  <div class="container">
    <p class="mb-0">StayEase &mdash; Student Accommodation Website</p>
    <p class="mb-0 small">Developed by Anjali Singh</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_BASE = "../backend-php/api/";

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const alertBox = document.getElementById("loginAlert");
  alertBox.classList.add("d-none");

  const formData = new FormData(e.target);
  const payload = Object.fromEntries(formData.entries());

  try {
    const res = await fetch(`${API_BASE}login.php`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || "Login failed");

    // Save the logged-in user locally so other pages (e.g. shortlist) can use it
    localStorage.setItem("stayease_user", JSON.stringify(json.user));
    window.location.href = "index.html";
  } catch (err) {
    alertBox.textContent = err.message || "Unable to reach the server. Please try again.";
    alertBox.classList.remove("d-none");
  }
});
</script>
</body>
</html>
