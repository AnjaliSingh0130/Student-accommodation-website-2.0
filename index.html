<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayEase | Student Accommodation Website</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark" style="background-color:#1a4971;">
  <div class="container">
    <a class="navbar-brand" href="index.html">🏠 StayEase</a>
    <span class="text-light small d-none d-sm-inline">Student Accommodation Website</span>
    <div class="d-flex gap-2">
      <a href="login.html" class="btn btn-sm btn-outline-light">Login</a>
      <a href="register.html" class="btn btn-sm btn-light">Sign Up</a>
    </div>
  </div>
</nav>

<section class="hero text-center">
  <div class="container">
    <h1 class="fw-bold">Find your next PG or hostel, hassle-free</h1>
    <p class="mb-0">Browse verified student accommodation near your college</p>
  </div>
</section>

<div class="container">
  <div class="filter-bar">
    <form id="filterForm" class="row g-3 align-items-end">
      <div class="col-sm-4">
        <label class="form-label">City</label>
        <select name="city" class="form-select">
          <option value="">All Cities</option>
          <option value="Varanasi">Varanasi</option>
          <option value="Lucknow">Lucknow</option>
        </select>
      </div>
      <div class="col-sm-4">
        <label class="form-label">Max Budget (₹/month)</label>
        <select name="budget" class="form-select">
          <option value="">Any Budget</option>
          <option value="5000">Up to 5,000</option>
          <option value="7000">Up to 7,000</option>
          <option value="9000">Up to 9,000</option>
        </select>
      </div>
      <div class="col-sm-3">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select">
          <option value="">Any</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Unisex">Unisex</option>
        </select>
      </div>
      <div class="col-sm-1 d-grid">
        <button type="submit" class="btn btn-primary">Go</button>
      </div>
    </form>
  </div>

  <div id="loadingIndicator" class="justify-content-center my-4">
    <div class="spinner-border text-primary" role="status"></div>
    <span class="ms-2">Loading properties…</span>
  </div>

  <div class="row mt-4" id="propertyGrid">
    <!-- Property cards are injected here via AJAX (see js/main.js) -->
  </div>
</div>

<footer class="text-center">
  <div class="container">
    <p class="mb-0">StayEase &mdash; Student Accommodation Website</p>
    <p class="mb-0 small">Developed by Anjali Singh</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="react/dist/bundle.js"></script>
<script src="js/main.js"></script>
</body>
</html>
