<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | StayEase</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark" style="background-color:#1a4971;">
  <div class="container">
    <a class="navbar-brand" href="index.html">🏠 StayEase</a>
    <span class="text-light small">Student Accommodation Website</span>
  </div>
</nav>

<div class="container py-5" style="max-width:420px;">
  <div class="card property-card p-4">
    <h3 class="mb-3 text-center">Create an Account</h3>
    <div id="registerAlert" class="alert alert-danger d-none" role="alert"></div>
    <div id="registerSuccess" class="alert alert-success d-none" role="alert"></div>
    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" name="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-control" name="phone">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign Up</button>
    </form>
    <p class="text-center mt-3 mb-0 small">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>
</div>

<footer class="text-center">
  <div class="container">
    <p class="mb-0">StayEase &mdash; Student Accommodation Website</p>
    <p class="mb-0 small">Developed by Anjali Singh</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_BASE = "../backend-php/api/";

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const alertBox = document.getElementById("registerAlert");
  const successBox = document.getElementById("registerSuccess");
  alertBox.classList.add("d-none");
  successBox.classList.add("d-none");

  const formData = new FormData(e.target);
  const payload = Object.fromEntries(formData.entries());

  try {
    const res = await fetch(`${API_BASE}signup.php`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || "Registration failed");

    successBox.textContent = "Account created successfully! Redirecting to login…";
    successBox.classList.remove("d-none");
    setTimeout(() => (window.location.href = "login.html"), 1200);
  } catch (err) {
    alertBox.textContent = err.message || "Unable to reach the server. Please try again.";
    alertBox.classList.remove("d-none");
  }
});
</script>
</body>
</html>
